name: Build Homebrew Bottle

on:
  push:
    branches:
      - main
    paths:
      - 'Formula/claude-usage-bar.rb'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag for bottle assets, for example v0.4.0"
        required: true
        type: string
      formula:
        description: "Formula name to bottle"
        required: true
        default: "claude-usage-bar"
        type: string
      commit_bottle_block:
        description: "Commit and push the generated bottle block to this tap"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  setup:
    name: Setup Variables
    runs-on: macos-14
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      formula: ${{ steps.vars.outputs.formula }}
      commit_bottle_block: ${{ steps.vars.outputs.commit_bottle_block }}
      should_run: ${{ steps.vars.outputs.should_run }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Compute variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "formula=${{ inputs.formula }}" >> $GITHUB_OUTPUT
            echo "commit_bottle_block=${{ inputs.commit_bottle_block }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            # Avoid running if push is by github-actions[bot] (which updates the bottle block)
            if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "should_run=true" >> $GITHUB_OUTPUT
            fi
            
            # Extract tag version from url line in Formula
            VERSION_TAG=$(grep -oE 'tags/[v0-9.-]+\.tar\.gz' Formula/claude-usage-bar.rb | head -n1 | cut -d'/' -f2 | sed 's/\.tar\.gz//')
            if [ -z "$VERSION_TAG" ]; then
              # Fallback to brew info
              VERSION=$(brew info --json Formula/claude-usage-bar.rb | jq -r '.[0].versions.stable')
              VERSION_TAG="v$VERSION"
            fi
            echo "Computed version tag: $VERSION_TAG"
            echo "release_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
            echo "formula=claude-usage-bar" >> $GITHUB_OUTPUT
            echo "commit_bottle_block=true" >> $GITHUB_OUTPUT
          fi

  bottle:
    name: Bottle ${{ needs.setup.outputs.formula }} on ${{ matrix.runner }}
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15-intel

    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Configure Homebrew
        run: |
          brew update-reset
          brew developer on
          brew tap sohryuu101/claude-usage-bar "$(pwd)"

      - name: Build bottle
        env:
          FORMULA: ${{ needs.setup.outputs.formula }}
          ROOT_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.setup.outputs.release_tag }}
        run: |
          brew test-bot \
            --only-formulae \
            --skip-dependents \
            --root-url="$ROOT_URL" \
            "$FORMULA"

      - name: Create release and upload bottle assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Homebrew bottles for $RELEASE_TAG"

          gh release upload "$RELEASE_TAG" ./*.bottle.* --clobber

      - name: Collect bottle assets
        run: |
          mkdir -p bottle-artifacts
          cp ./*.bottle.* bottle-artifacts/

      - name: Upload bottle assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-assets-${{ matrix.runner }}
          path: bottle-artifacts/

  merge-bottles:
    name: Merge bottle block
    runs-on: macos-14
    needs: [setup, bottle]
    if: needs.setup.outputs.should_run == 'true'

    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Homebrew
        run: |
          brew update-reset
          brew developer on
          brew tap sohryuu101/claude-usage-bar "$(pwd)"

      - name: Download bottle assets
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-assets-*
          path: bottle-artifacts
          merge-multiple: true

      - name: Generate bottle block patch
        run: |
          brew bottle --merge --write --no-commit bottle-artifacts/*.bottle.json
          git diff -- Formula > bottle-artifacts/bottle-block.patch

          echo "Bottle block patch:"
          cat bottle-artifacts/bottle-block.patch

      - name: Commit bottle block
        if: ${{ needs.setup.outputs.commit_bottle_block == 'true' }}
        env:
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
          FORMULA: ${{ needs.setup.outputs.formula }}
        run: |
          if git diff --quiet -- Formula; then
            echo "No bottle block changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "Add bottle for ${FORMULA} ${RELEASE_TAG}"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload bottle block patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-block-${{ needs.setup.outputs.release_tag }}
          path: bottle-artifacts/
